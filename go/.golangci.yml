version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - gosec
  disable:
    # noisy or redundant with go vet for this small codebase; re-enable as needed
    - depguard
    - exhaustruct
    - funlen
    - gochecknoglobals
    - lll
    - nlreturn
    - tagliatelle
    - varnamelen
    - wsl
  settings:
    gosec:
      excludes:
        - G107  # variable URLs in tests
        - G101  # env var name constants
        - G304  # config/migration file reads from configured paths
        - G115  # intentional uint64↔int64 mask conversion
        - G703  # config file path from env, not user input

issues:
  max-same-issues: 10
