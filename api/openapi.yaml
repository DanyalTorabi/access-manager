openapi: 3.0.3
info:
  title: access-manager HTTP API
  description: |
    Domain-scoped access control (users, groups, resources, permissions, authorization checks).

    **CRUD JSON responses** (domains, users, groups, resources, access types, permissions) use Go struct field names as serialized by `encoding/json` (e.g. `ID`, `DomainID`, `AccessMask`).

    **Authz JSON responses** (`/authz/check`, `/authz/masks`) use **snake_case** keys in `map[string]any` payloads (e.g. `allowed`, `effective_mask`, `masks`).

    **Request bodies** use explicit `json` struct tags, mostly **snake_case** (e.g. `title`, `resource_id`, `access_mask`, `parent_group_id`).

    **Numeric masks and bits:** The API uses `uint64` in Go; SQLite stores `access_types.bit` and `permissions.access_mask` as **signed INTEGER** (64-bit). Values are safe in **`[0, 2^63-1]`** in practice.

    **Bearer auth:** The server applies `Authorization: Bearer <token>` only when `API_BEARER_TOKEN` / `api_bearer_token` is set. This spec models that as **optional** Bearer (see root `security`).
  version: 0.1.0

servers:
  - url: http://127.0.0.1:8080
    description: Default local listen address

tags:
  - name: Health
  - name: Domains
  - name: Users
  - name: Groups
  - name: Resources
  - name: AccessTypes
  - name: Permissions
  - name: Memberships
  - name: Grants
  - name: Authz

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        When the server is configured with `API_BEARER_TOKEN`, valid `Authorization: Bearer <token>` is required on `/api/v1/*`.
        When unset, the server does not enforce this scheme (see root `security` — optional auth).

  parameters:
    domainID:
      name: domainID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    userID:
      name: userID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    groupID:
      name: groupID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    resourceID:
      name: resourceID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    permissionID:
      name: permissionID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    accessTypeID:
      name: accessTypeID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    offsetParam:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Number of items to skip (pagination).
    limitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maximum items to return (clamped to 1–100).
    searchParam:
      name: search
      in: query
      required: false
      schema:
        type: string
        maxLength: 255
      description: Case-insensitive match on title. LIKE wildcards (`%`, `_`) are treated as literals. Match mode controlled by `search_type`.
    searchTypeParam:
      name: search_type
      in: query
      required: false
      schema:
        type: string
        enum: [contains, starts_with, ends_with]
        default: contains
      description: How to match the search term against title. Only applies when `search` is non-empty.

  schemas:
    ListMeta:
      type: object
      required: [total, offset, limit]
      properties:
        total:
          type: integer
          format: int64
          description: Total number of records matching the filter (before pagination).
        offset:
          type: integer
        limit:
          type: integer

    ErrorBody:
      type: object
      description: >-
        User-facing error envelope. The `error` field contains a short,
        database-agnostic message suitable for display. Internal details
        (SQL driver text, stack traces) are never included; operators should
        consult server logs for diagnostics. Messages are stable per error
        class (404 → "resource not found", 409 → "resource already exists",
        500 → "internal server error"). 400 responses may include
        request-specific validation details (e.g. "cycle detected …").
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message; stable per error class, 400s may vary with validation detail.
      example:
        error: resource not found

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    Domain:
      type: object
      required: [ID, Title]
      properties:
        ID:
          type: string
          format: uuid
        Title:
          type: string

    TitleBody:
      type: object
      required: [title]
      properties:
        title:
          type: string

    PatchTitleBody:
      type: object
      required: [title]
      properties:
        title:
          type: string

    GroupPatchBody:
      type: object
      description: |
        At least one of `title` or `parent_group_id` must be present.
        Omit `parent_group_id` to leave the parent unchanged; send `null` to clear (root group).
      minProperties: 1
      properties:
        title:
          type: string
        parent_group_id:
          type: string
          format: uuid
          nullable: true

    AccessTypePatchBody:
      type: object
      description: At least one of `title` or `bit` must be present.
      minProperties: 1
      properties:
        title:
          type: string
        bit:
          type: string
          description: Decimal or `0x` hex (parsed server-side).

    PermissionPatchBody:
      type: object
      description: At least one of `title`, `resource_id`, or `access_mask` must be present.
      minProperties: 1
      properties:
        title:
          type: string
        resource_id:
          type: string
          format: uuid
        access_mask:
          type: string
          description: Decimal or `0x` hex.

    User:
      type: object
      required: [ID, DomainID, Title]
      properties:
        ID:
          type: string
          format: uuid
        DomainID:
          type: string
          format: uuid
        Title:
          type: string

    Group:
      type: object
      required: [ID, DomainID, Title]
      properties:
        ID:
          type: string
          format: uuid
        DomainID:
          type: string
          format: uuid
        Title:
          type: string
        ParentGroupID:
          type: string
          format: uuid
          nullable: true

    GroupCreateBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
        parent_group_id:
          type: string
          format: uuid
          nullable: true

    ParentBody:
      type: object
      properties:
        parent_group_id:
          type: string
          format: uuid
          nullable: true

    Resource:
      type: object
      required: [ID, DomainID, Title]
      properties:
        ID:
          type: string
          format: uuid
        DomainID:
          type: string
          format: uuid
        Title:
          type: string

    AccessType:
      type: object
      required: [ID, DomainID, Title, Bit]
      properties:
        ID:
          type: string
          format: uuid
        DomainID:
          type: string
          format: uuid
        Title:
          type: string
        Bit:
          type: integer
          format: int64
          minimum: 0
          maximum: 9223372036854775807
          description: |
            Non-negative bit flag as JSON number (`uint64` in Go). Stored as SQLite INTEGER (signed); use range [0, 2^63−1].

    AccessTypeCreateBody:
      type: object
      required: [title, bit]
      properties:
        title:
          type: string
        bit:
          type: string
          description: Decimal or `0x` hex (parsed server-side).

    Permission:
      type: object
      required: [ID, DomainID, Title, ResourceID, AccessMask]
      properties:
        ID:
          type: string
          format: uuid
        DomainID:
          type: string
          format: uuid
        Title:
          type: string
        ResourceID:
          type: string
          format: uuid
        AccessMask:
          type: integer
          format: int64
          minimum: 0
          maximum: 9223372036854775807
          description: |
            Permission mask as JSON number (`uint64` in Go). Stored as SQLite INTEGER (signed); use range [0, 2^63−1].

    PermissionCreateBody:
      type: object
      required: [title, resource_id, access_mask]
      properties:
        title:
          type: string
        resource_id:
          type: string
          format: uuid
        access_mask:
          type: string
          description: Decimal or `0x` hex.

    AuthzCheckResponse:
      type: object
      required: [allowed, effective_mask]
      properties:
        allowed:
          type: boolean
        effective_mask:
          type: string
          description: Effective mask as decimal string.

    AuthzMasksResponse:
      type: object
      required: [masks]
      properties:
        masks:
          type: array
          items:
            type: integer
            format: int64
            minimum: 0
            maximum: 9223372036854775807
          description: Individual permission masks (uint64); JSON numbers in SQLite-safe non-negative range.

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness / readiness
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/domains:
    get:
      tags: [Domains]
      summary: List domains
      parameters:
        - $ref: "#/components/parameters/offsetParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/searchParam"
        - $ref: "#/components/parameters/searchTypeParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Domain"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
        "400":
          description: Bad request (invalid pagination or search params)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized (when bearer required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      tags: [Domains]
      summary: Create domain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TitleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}:
    parameters:
      - $ref: "#/components/parameters/domainID"
    get:
      tags: [Domains]
      summary: Get domain
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    patch:
      tags: [Domains]
      summary: Patch domain (title)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTitleBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    delete:
      tags: [Domains]
      summary: Delete domain
      description: |
        Fails with **400** if the domain still has users, groups, resources, access types, permissions, or related rows (foreign key RESTRICT).
      responses:
        "204":
          description: No content
        "400":
          description: Bad request (e.g. entity still referenced)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}/users:
    parameters:
      - $ref: "#/components/parameters/domainID"
    get:
      tags: [Users]
      summary: List users in domain
      parameters:
        - $ref: "#/components/parameters/offsetParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/searchParam"
        - $ref: "#/components/parameters/searchTypeParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
        "400":
          description: Bad request (invalid pagination or search params)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TitleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}/users/{userID}:
    parameters:
      - $ref: "#/components/parameters/domainID"
      - $ref: "#/components/parameters/userID"
    get:
      tags: [Users]
      summary: Get user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    patch:
      tags: [Users]
      summary: Patch user (title)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTitleBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    delete:
      tags: [Users]
      summary: Delete user
      description: Fails with **400** if the user still has group memberships or direct permission grants.
      responses:
        "204":
          description: No content
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}/groups:
    parameters:
      - $ref: "#/components/parameters/domainID"
    get:
      tags: [Groups]
      summary: List groups
      parameters:
        - $ref: "#/components/parameters/offsetParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/searchParam"
        - $ref: "#/components/parameters/searchTypeParam"
        - name: parent_group_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter groups by parent group ID.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
        "400":
          description: Bad request (invalid pagination or search params)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      tags: [Groups]
      summary: Create group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupCreateBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}/groups/{groupID}:
    parameters:
      - $ref: "#/components/parameters/domainID"
      - $ref: "#/components/parameters/groupID"
    get:
      tags: [Groups]
      summary: Get group
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    patch:
      tags: [Groups]
      summary: Patch group (title and/or parent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupPatchBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    delete:
      tags: [Groups]
      summary: Delete group
      description: Fails with **400** if the group has members, child groups, or group permission grants.
      responses:
        "204":
          description: No content
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}/groups/{groupID}/parent:
    parameters:
      - $ref: "#/components/parameters/domainID"
      - $ref: "#/components/parameters/groupID"
    patch:
      tags: [Groups]
      summary: Set group parent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParentBody"
      responses:
        "204":
          description: No content
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}/resources:
    parameters:
      - $ref: "#/components/parameters/domainID"
    get:
      tags: [Resources]
      summary: List resources
      parameters:
        - $ref: "#/components/parameters/offsetParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/searchParam"
        - $ref: "#/components/parameters/searchTypeParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Resource"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
        "400":
          description: Bad request (invalid pagination or search params)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      tags: [Resources]
      summary: Create resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TitleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}/resources/{resourceID}:
    parameters:
      - $ref: "#/components/parameters/domainID"
      - $ref: "#/components/parameters/resourceID"
    get:
      tags: [Resources]
      summary: Get resource
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    patch:
      tags: [Resources]
      summary: Patch resource (title)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTitleBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    delete:
      tags: [Resources]
      summary: Delete resource
      description: Fails with **400** while permissions still reference this resource.
      responses:
        "204":
          description: No content
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Not found
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/v1/domains/{domainID}/access-types:
    parameters:
      - $ref: "#/components/parameters/domainID"
    get:
      tags: [AccessTypes]
      summary: List access types
      parameters:
        - $ref: "#/components/parameters/offsetParam"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/searchParam"
        - $ref: "#/components/parameters/searchTypeParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccessType"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
        "400":
          description: Bad request (invalid pagination or search params)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    post:
      tags: [AccessTypes]
      summary: Create access type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessTypeCreateBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessType"
        "400":
