      - $ref: "#/components/parameters/domainID"
      - name: user_id
        in: query
        required: true
        schema:
          type: string
          format: uuid
      - name: resource_id
        in: query
        required: true
        schema:
          type: string
          format: uuid
      - name: access_bit
        in: query
        required: true
        schema:
          type: string
          description: Decimal or `0x` hex access bit to test.
    get:
      tags: [Authz]
      summary: Check if user has access bit on resource
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzCheckResponse"
        "400":
          description: |
            Missing required query parameters (`text/plain` from `http.Error`), or invalid `access_bit` (`application/json` from `writeErr` / parse error).
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

