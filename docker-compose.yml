# T19 — local app + SQLite. Host port bound to loopback only (see README).
# DB is ephemeral (tmpfs) unless you change volumes.
# T23 — Prometheus + Grafana for observability.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      HTTP_ADDR: "0.0.0.0:8080"
      DATABASE_URL: "file:/data/access.db?_pragma=foreign_keys(1)"
      MIGRATIONS_DIR: "migrations/sqlite"
    tmpfs:
      - /data:mode=1777,size=64m

  prometheus:
    image: prom/prometheus:v3.4.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana:12.0.0
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    depends_on:
      - prometheus
